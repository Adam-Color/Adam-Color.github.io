<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Me</title>
    <link rel="stylesheet" href="assets/css/styles.css">
    <link rel="icon" href="assets/images/Colorist_Square.jpg">
</head>
<body>
    <header>
        <img src="assets/images/LOGO.png">
        <nav>
            <a href="index.html">Home</a>
            <a href="projects.html">Projects</a>
            <a href="software.html">Software</a>
            <a href="about.html">About Me</a>
            <b href="contact.html">Contact</b>
        </nav>
    </header>

    <section id="contact">
        <h2>Let's Talk!</h2>
        <p>Have a project in mind? Reach out to me.</p>

        <action="https://formspree.io/f/mnnparel" method="POST">
            <div class="form-group">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" maxlength="100" required>
            </div>

            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" maxlength="100" required>
            </div>

            <div class="form-group">
                <label for="description">Briefly describe your project:</label>
                <textarea id="description" name="description" class="limited-resize" maxlength="500" required></textarea>
            </div>

            <div class="form-group">
                <label for="runtime">Estimated Final Runtime:</label>
                <input type="text" id="runtime" name="runtime" maxlength="50">
            </div>

            <div class="form-group">
                <label for="NLE">Editing Software Used:</label>
                <input type="text" id="NLE" name="NLE" maxlength="60">
            </div>

            <div class="form-group">
                <label for="HDR">Did You Use Proxies When Editing?</label>
                <div class="radio-options">
                    <label class="checkbox-group">
                        <input type="radio" name="used_proxies" value="Yes" required>
                        Yes
                    </label>
                    <label class="checkbox-group">
                        <input type="radio" name="used_proxies" value="No">
                        No
                    </label>
                    <label class="checkbox-group">
                        <input type="radio" name="used_proxies" value="Not Sure">
                        Not Sure
                    </label>
                </div>
            </div>

        <div class="form-group">
            <label for="location">How Would You Like to Collaborate?</label>
            <div class="radio-options">
                <label class="checkbox-group">
                    <input type="radio" name="collaboration" value="In-Person">
                    In-Person (Atlanta)
                </label>
                <label class="checkbox-group">
                    <input type="radio" name="collaboration" value="Remote">
                    Remote
                </label>
            </div>
        </div>


            <button type="submit">Send</button>
        </form>
    </section>


    <footer>
        <p>&copy; 2026 Adam Blair-Smith</p>
    </footer>
</body>
</html>
